<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f8fa; color: #1a1a2e; min-height: 100vh; }

.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 20px 20px 28px;
  color: white;
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.header-location { font-size: 12px; opacity: 0.8; letter-spacing: 0.05em; text-transform: uppercase; }
.header-title { font-size: 20px; font-weight: 700; margin-top: 2px; }
.header-time { font-size: 11px; opacity: 0.7; margin-top: 3px; }
.refresh-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 20px; padding: 6px 12px; font-size: 12px; color: white; cursor: pointer; white-space: nowrap; }
.refresh-btn:active { background: rgba(255,255,255,0.35); }

.main-temp-card {
  background: white;
  margin: -16px 16px 0;
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.main-temp-left { flex: 1; }
.main-temp-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.main-temp-value { font-size: 48px; font-weight: 300; color: #1a1a2e; line-height: 1; }
.main-temp-value sup { font-size: 20px; font-weight: 400; color: #888; vertical-align: super; }
.main-temp-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
.meta-item { font-size: 11px; color: #aaa; line-height: 1.5; }
.meta-item b { display: block; font-size: 13px; font-weight: 600; color: #333; }
.meta-item span { font-size: 10px; color: #bbb; }
.main-temp-icon { font-size: 52px; line-height: 1; margin-left: 12px; }

.kpi-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; padding: 14px 16px 0; }
.kpi-card { background: white; border-radius: 16px; padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
.kpi-card.full { grid-column: span 2; }
.kpi-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.kpi-icon { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.kpi-icon.blue { background: #e8f4ff; }
.kpi-icon.teal { background: #e6f9f3; }
.kpi-icon.amber { background: #fff8e6; }
.kpi-icon.purple { background: #f3eeff; }
.kpi-icon.pink { background: #fff0f5; }
.kpi-card-title { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.kpi-card-value { font-size: 26px; font-weight: 600; color: #1a1a2e; line-height: 1; }
.kpi-card-unit { font-size: 13px; font-weight: 400; color: #aaa; }
.kpi-sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 7px; }
.kpi-sub-item { font-size: 10px; color: #bbb; line-height: 1.6; }
.kpi-sub-item b { display: block; font-size: 12px; font-weight: 600; color: #555; }
.kpi-sub-item span { font-size: 10px; color: #ccc; }
.kpi-sub-single { font-size: 11px; color: #aaa; margin-top: 6px; line-height: 1.6; }
.kpi-sub-single b { color: #555; font-weight: 500; }

.section-header { padding: 18px 16px 8px; font-size: 11px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.07em; }
.chart-card { background: white; border-radius: 16px; margin: 0 16px 10px; padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
.chart-card-title { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.chart-card-title span { font-size: 13px; font-weight: 600; color: #1a1a2e; }
.chart-card-title em { font-size: 11px; color: #ccc; font-style: normal; margin-left: auto; }

.loading { text-align: center; padding: 4rem 1rem; color: #bbb; }
.spinner { width: 30px; height: 30px; border: 3px solid #f0f0f0; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
.error { background: #fff5f5; border-radius: 16px; padding: 14px 16px; margin: 16px; font-size: 13px; color: #e53e3e; }
@keyframes spin { to { transform: rotate(360deg); } }
.pb { padding-bottom: 24px; }
</style>
</head>

let charts = {};
function b64url(s){return btoa(unescape(encodeURIComponent(s))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
function b64urlB(a){let s='';a.forEach(b=>s+=String.fromCharCode(b));return btoa(s).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
async function getToken(){
  const now=Math.floor(Date.now()/1000);
  const h=b64url(JSON.stringify({alg:"RS256",typ:"JWT"}));
  const p=b64url(JSON.stringify({iss:SA.client_email,scope:"https://www.googleapis.com/auth/bigquery",aud:"https://oauth2.googleapis.com/token",exp:now+3600,iat:now}));
  const sig=h+"."+p;
  const pem=SA.private_key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const der=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const key=await crypto.subtle.importKey("pkcs8",der.buffer,{name:"RSASSA-PKCS1-v1_5",hash:"SHA-256"},false,["sign"]);
  const bytes=await crypto.subtle.sign("RSASSA-PKCS1-v1_5",key,new TextEncoder().encode(sig));
  const jwt=sig+"."+b64urlB(new Uint8Array(bytes));
  const r=await fetch("https://oauth2.googleapis.com/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const d=await r.json();
  if(!d.access_token)throw new Error("Auth: "+JSON.stringify(d));
  return d.access_token;
}
async function queryBQ(token,sql){
  const r=await fetch(`https://bigquery.googleapis.com/bigquery/v2/projects/${SA.project_id}/queries`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({query:sql,useLegacySql:false,timeoutMs:15000,location:"europe-west9"})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d;
}
function parseRows(res){
  if(!res.rows)return[];
  const f=res.schema.fields.map(f=>f.name);
  return res.rows.map(r=>{const o={};r.f.forEach((v,i)=>o[f[i]]=v.v);return o;});
}
function makeChart(id,type,labels,datasets,opts={}){
  if(charts[id])charts[id].destroy();
  const ctx=document.getElementById(id).getContext('2d');
  charts[id]=new Chart(ctx,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:true,aspectRatio:5,animation:false,plugins:{legend:{display:datasets.length>1,labels:{color:'#ccc',font:{size:10},boxWidth:10,padding:6}}},scales:{x:{ticks:{color:'#ccc',font:{size:9},maxTicksLimit:7},grid:{color:'rgba(0,0,0,0.03)'}},y:{ticks:{color:'#ccc',font:{size:9}},grid:{color:'rgba(0,0,0,0.03)'},...(opts.y0!==false?{beginAtZero:true}:{})}}}});
}
function tempIcon(t){if(t===null)return'🌡️';if(t>=35)return'🥵';if(t>=25)return'☀️';if(t>=15)return'🌤️';if(t>=5)return'🌥️';return'🥶';}
function fmt(v,d=1){return(v!==null&&v!==''&&v!==undefined)?parseFloat(v).toFixed(d):'—';}
function n(v){return(v!==null&&v!==''&&v!==undefined)?parseFloat(v):null;}
function pad(x){return String(x).padStart(2,'0');}
function hhmm(ts){if(!ts)return'—';const t=ts.includes('T')?ts:ts.replace(' ','T');const d=new Date(t);return pad(d.getHours())+':'+pad(d.getMinutes());}

async function loadData(){
  try{
    const token=await getToken();
    const [kpiRes,lastRes,extremesRes,chartRes]=await Promise.all([
      queryBQ(token,`
        SELECT
          MAX(tempHigh) AS temp_max, MIN(tempLow) AS temp_min, AVG(tempAvg) AS temp_moy,
          SUM(somme) AS pluie_total,
          MAX(precipRate) AS pluie_rate_max,
          MAX(windgustHigh) AS vent_rafale_max,
          AVG(humidityAvg) AS humidite_moy,
          MAX(humidityHigh) AS humidite_max, MIN(humidityLow) AS humidite_min,
          MAX(pressureMax) AS pression_max, MIN(pressureMin) AS pression_min,
          SUM(CASE WHEN solarRadiationHigh>120 THEN 5.0/60.0 ELSE 0 END) AS ens_h
        FROM \`meteo_cintre.data_5_min_today\`
      `),
      queryBQ(token,`
        SELECT tempHigh AS temp_actuelle, windgustHigh AS vent_actuel,
               humidityAvg AS hum_actuelle, pressureMax AS pression_actuelle,
               solarRadiationHigh AS soleil_actuel,
               FORMAT_TIMESTAMP('%H:%M', obsTimeLocal) AS heure
        FROM \`meteo_cintre.data_5_min_today\`
        ORDER BY obsTimeLocal DESC LIMIT 1
      `),
      queryBQ(token,`
        SELECT
          FORMAT_TIMESTAMP('%H:%M', t_max.obsTimeLocal) AS heure_temp_max,
          FORMAT_TIMESTAMP('%H:%M', t_min.obsTimeLocal) AS heure_temp_min,
          FORMAT_TIMESTAMP('%H:%M', p_max.obsTimeLocal) AS heure_pluie_max,
          FORMAT_TIMESTAMP('%H:%M', h_max.obsTimeLocal) AS heure_hum_max,
          FORMAT_TIMESTAMP('%H:%M', h_min.obsTimeLocal) AS heure_hum_min,
          FORMAT_TIMESTAMP('%H:%M', v_max.obsTimeLocal) AS heure_vent_max
        FROM
          (SELECT obsTimeLocal FROM \`meteo_cintre.data_5_min_today\` ORDER BY tempHigh DESC LIMIT 1) t_max,
          (SELECT obsTimeLocal FROM \`meteo_cintre.data_5_min_today\` ORDER BY tempLow ASC LIMIT 1) t_min,
          (SELECT obsTimeLocal FROM \`meteo_cintre.data_5_min_today\` ORDER BY precipRate DESC LIMIT 1) p_max,
          (SELECT obsTimeLocal FROM \`meteo_cintre.data_5_min_today\` ORDER BY humidityHigh DESC LIMIT 1) h_max,
          (SELECT obsTimeLocal FROM \`meteo_cintre.data_5_min_today\` ORDER BY humidityLow ASC LIMIT 1) h_min,
          (SELECT obsTimeLocal FROM \`meteo_cintre.data_5_min_today\` ORDER BY windgustHigh DESC LIMIT 1) v_max
      `),
      queryBQ(token,`
        SELECT
          FORMAT_TIMESTAMP('%H:%M', obsTimeLocal) AS heure,
          tempHigh, tempLow,
          AVG(tempAvg) OVER (ORDER BY obsTimeLocal ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS tempMoyCumul,
          somme AS pluie, precipRate AS pluie_rate,
          windspeedAvg AS vent, windgustHigh AS rafale,
          humidityAvg AS humidite,
          solarRadiationHigh AS soleil
        FROM \`meteo_cintre.data_5_min_today\`
        ORDER BY obsTimeLocal ASC
      `)
    ]);

    const k=parseRows(kpiRes)[0]||{};
    const last=parseRows(lastRes)[0]||{};
    const ex=parseRows(extremesRes)[0]||{};
    const rows=parseRows(chartRes);
    const labels=rows.map(r=>r.heure);

    const tempActuelle=n(last.temp_actuelle);
    const delta=(n(k.temp_max)!==null&&n(k.temp_min)!==null)?(n(k.temp_max)-n(k.temp_min)).toFixed(1):'—';
    const ensH=parseFloat(k.ens_h||0);
    const ensHH=Math.floor(ensH);
    const ensMM=Math.round((ensH-ensHH)*60);
    const ensStr=ensHH>0?`${ensHH}H${pad(ensMM)}`:`${ensMM}min`;

    const now=new Date();
    const dateStr=now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

    document.getElementById('app').innerHTML=`
      <div class="header">
        <div class="header-top">
          <div>
            <div class="header-location">📍 Cintré, Bretagne</div>
            <div class="header-title">Suivi journée en cours</div>
            <div class="header-time">${dateStr} · dernière donnée ${last.heure||'—'}</div>
          </div>
          <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
        </div>
      </div>

      <div class="main-temp-card">
        <div class="main-temp-left">
          <div class="main-temp-label">Température actuelle</div>
          <div class="main-temp-value">${fmt(tempActuelle)}<sup>°C</sup></div>
          <div class="main-temp-meta">
            <div class="meta-item">
              <b>↑ ${fmt(k.temp_max)}°C</b>
              <span>${ex.heure_temp_max||'—'}</span>
            </div>
            <div class="meta-item">
              <b>↓ ${fmt(k.temp_min)}°C</b>
              <span>${ex.heure_temp_min||'—'}</span>
            </div>
            <div class="meta-item">
              <b>Moy ${fmt(k.temp_moy)}°C</b>
            </div>
            <div class="meta-item">
              <b>Δ ${delta}°C</b>
            </div>
          </div>
        </div>
        <div class="main-temp-icon">${tempIcon(tempActuelle)}</div>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-card-header">
            <div class="kpi-icon blue">🌧️</div>
            <div class="kpi-card-title">Pluie du jour</div>
          </div>
          <div class="kpi-card-value">${fmt(k.pluie_total)}<span class="kpi-card-unit"> mm</span></div>
          <div class="kpi-sub-grid">
            <div class="kpi-sub-item"><b>${fmt(k.pluie_rate_max)} mm/h</b><span>Intensité max</span></div>
            <div class="kpi-sub-item"><b>${ex.heure_pluie_max||'—'}</b><span>heure max</span></div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card-header">
            <div class="kpi-icon teal">💨</div>
            <div class="kpi-card-title">Vent</div>
          </div>

          <div class="kpi-sub-grid">
            <div class="kpi-sub-item"><b>${fmt(k.vent_rafale_max)} km/h</b><span>Rafale max (56s)</span></div>
            <div class="kpi-sub-item"><b>${ex.heure_vent_max||'—'}</b><span>heure max</span></div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card-header">
            <div class="kpi-icon amber">☀️</div>
            <div class="kpi-card-title">Ensoleillement</div>
          </div>
          <div class="kpi-card-value">${ensStr}</div>
          <div class="kpi-sub-single">Rayonnement actuel<br><b>${fmt(n(last.soleil_actuel),0)} W/m²</b></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card-header">
            <div class="kpi-icon pink">💦</div>
            <div class="kpi-card-title">Humidité</div>
          </div>
          <div class="kpi-card-value">${fmt(k.humidite_moy,0)}<span class="kpi-card-unit">%</span></div>
          <div class="kpi-sub-grid">
            <div class="kpi-sub-item"><b>↑ ${fmt(k.humidite_max,0)}%</b><span>${ex.heure_hum_max||'—'}</span></div>
            <div class="kpi-sub-item"><b>↓ ${fmt(k.humidite_min,0)}%</b><span>${ex.heure_hum_min||'—'}</span></div>
          </div>
        </div>
        <div class="kpi-card full">
          <div class="kpi-card-header">
            <div class="kpi-icon purple">🔵</div>
            <div class="kpi-card-title">Pression</div>
          </div>
          <div class="kpi-card-value">${fmt(n(last.pression_actuelle),0)}<span class="kpi-card-unit"> hPa</span></div>
          <div class="kpi-sub-single">↑ <b>${fmt(k.pression_max,0)} hPa</b> &nbsp;·&nbsp; ↓ <b>${fmt(k.pression_min,0)} hPa</b></div>
        </div>
      </div>

      <div class="section-header">Graphiques du jour</div>
      <div class="chart-card">
        <div class="chart-card-title"><span>🌡️ Température</span><em>°C</em></div>
        <canvas id="cTemp" style="max-height:80px;"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-card-title"><span>🌧️ Pluie</span><em>mm</em></div>
        <canvas id="cPluie" style="max-height:80px;"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-card-title"><span>💨 Vent</span><em>km/h</em></div>
        <canvas id="cVent" style="max-height:80px;"></canvas>
      </div>
      <div class="chart-card pb">
        <div class="chart-card-title"><span>☀️ Rayonnement</span><em>W/m²</em></div>
        <canvas id="cSoleil" style="max-height:80px;"></canvas>
      </div>
    `;

    makeChart('cTemp','line',labels,[
      {label:'Moy',data:rows.map(r=>n(r.tempMoyCumul)),borderColor:'#e8604c',backgroundColor:'rgba(232,96,76,0.08)',fill:true,tension:0.4,pointRadius:0,borderWidth:2},
      {label:'Max',data:rows.map(r=>n(r.tempHigh)),borderColor:'#ddd',backgroundColor:'transparent',tension:0.4,pointRadius:0,borderWidth:1,borderDash:[3,3]},
      {label:'Min',data:rows.map(r=>n(r.tempLow)),borderColor:'#ddd',backgroundColor:'transparent',tension:0.4,pointRadius:0,borderWidth:1,borderDash:[3,3]},
    ],{y0:false});
    makeChart('cPluie','bar',labels,[
      {label:'Précip.',data:rows.map(r=>n(r.pluie)),backgroundColor:'rgba(74,158,221,0.65)',borderRadius:2},
      {label:'Intensité',data:rows.map(r=>n(r.pluie_rate)),type:'line',borderColor:'#1a6aaa',backgroundColor:'transparent',tension:0.3,pointRadius:0,borderWidth:1.5}
    ]);
    makeChart('cVent','line',labels,[
      {label:'Moy',data:rows.map(r=>n(r.vent)),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',fill:true,tension:0.3,pointRadius:0,borderWidth:2},
      {label:'Rafale',data:rows.map(r=>n(r.rafale)),borderColor:'#ddd',backgroundColor:'transparent',tension:0.3,pointRadius:0,borderWidth:1,borderDash:[3,3]}
    ]);
    makeChart('cSoleil','bar',labels,[
      {label:'W/m²',data:rows.map(r=>n(r.soleil)),backgroundColor:'rgba(245,197,24,0.65)',borderRadius:2}
    ]);

  }catch(e){
    document.getElementById('app').innerHTML=`<div style="padding:16px"><div class="error">⚠️ ${e.message}</div></div>`;
  }
}

loadData();
setInterval(loadData,5*60*1000);
</script>
