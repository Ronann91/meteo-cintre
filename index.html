<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Météo — Cintré</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f2; color: #1a1a1a; min-height: 100vh; }
  .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 12px 16px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
  .header-left h1 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header-left h1 svg { width: 20px; height: 20px; }
  .last-update { font-size: 11px; color: #888; margin-top: 2px; }
  .refresh-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #555; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .refresh-btn:active { background: #f0f0f0; }
  .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px 16px; }
  .kpi-card { background: #fff; border-radius: 12px; padding: 12px 14px; }
  .kpi-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .kpi-label svg { width: 14px; height: 14px; flex-shrink: 0; }
  .kpi-value { font-size: 28px; font-weight: 600; color: #1a1a1a; line-height: 1; }
  .kpi-unit { font-size: 15px; font-weight: 400; color: #888; }
  .kpi-sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .section { padding: 0 16px 4px; }
  .section-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; padding-top: 8px; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
  .loading { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #378ADD; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: #fff0f0; border-radius: 12px; padding: 14px 16px; margin: 16px; font-size: 13px; color: #c0392b; border-left: 3px solid #c0392b; }
  .spinning { animation: spin 0.8s linear infinite; display: inline-block; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #f0f0f0; }
    .header { background: #242424; border-color: #333; }
    .kpi-card, .chart-wrap { background: #242424; }
    .kpi-value { color: #f0f0f0; }
    .refresh-btn { border-color: #444; color: #aaa; }
    .refresh-btn:active { background: #333; }
    .error { background: #2a1515; border-color: #c0392b; color: #ff6b6b; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>
      Météo — Cintré
    </h1>
    <div class="last-update" id="last-update">Chargement...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">
    <svg id="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
    Actualiser
  </button>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div>Connexion à BigQuery...</div>
</div>

<script>
const SA = {
  project_id: "mystic-aileron-471209-p6",
  client_email: "app-perso@mystic-aileron-471209-p6.iam.gserviceaccount.com",
  private_key: "-----BEGIN PRIVATE KEY-----\nMIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQDBjetWxhjhSL4F\nWqQzif3uQoHH8tFceFmKHX0zg8qy9XZjSmpZApkBL1m/UX3VoHEehPd7aLMuC86j\nzvSfvv3kh1fZBzXtW6OGmlDgMLIIFzXJfd9efe24iX7CzGTuQPa6MG+/kg+KlKUT\nXvTOpT8pRLCcIDqkUGpCT0QGERCbQ0oueQXRA9JwXyOfJoukODhWqsgMPEoIt+xV\nFt3WqQQXAeyvHOP6oA4mSJisk7ShrVXKN9R4ik1LO/jXlRlEH2MH3mYbalSHyeic\n/tHkQjJ6wP61NjhQnInqWo7Tny4qtrPwpU3kj+Y7uoDWAiVYIAsLLR62h7YAPNEZ\noD6OFZkvAgMBAAECggEADPR1TIUM1ENcqJoVBHgXfXOJITtw5OoPQC3SG/kVv52r\nU2D/Nj70w74KGUKYlAxdlefbcrCi0ZGrvo4TFIAhmUKv0BBp/R2Vl+RLRn4r5Fu9\nV2Or6DSwjRny2JH6rXG+sd6dFCrwDFv/oojIBO7Nh/MXiROlKStSuWZ5zJgmzuV3\nlW63l7RRLujmr5Z4kaNK8x1EMmhNHg7FvBLJ7MdHOXQh8zPE+1YC9laBqQwZaEvJ\nq51hNKTWFhB5pg4SqL+0pbgzQ4Wg58grIhRaw6z9YYwgFPc59YSRB5xUCfTUt6Hg\nILw9O3Z5CNRKBLzA6Q6jIyzbLEyOGcZTy0Sq2AJr+QKBgQD7E8KPh96aykXYxnvz\nc7jd6Irb3H0Dyd1P2kKb9C6FWWW+XU4wcOws49WMBAp03KJm/h2rEvbzXk1u1eHL\n/SwVhRuZkrTluIitvyvC3TZKCXZGLVKhbRq1TKuqoV2V1vV5Re29E0abliRWhFoP\n2ZFGrIMngvck/knyV63b3U82SQKBgQDFWW7hh0abOnn2KlVR8h4l6Sp/N3Nu1//U\nE9mY9IeCZ2PlwefnCQRuAW/tX6/FGerOne+RmUfoCkEqaOYQNoAiNhzhRLIF4cey\nyJxpsHuFFLssuNX3brm8y1vdQ5FdPSnp1KC/nHUt23bGqo2yO8pBL3rCsl6diTRJ\n5xEMMHtztwKBgDigi0gN79HffwNWOMx+tBowgWj3AKcjFywUYOOFnhxrPjxCFQlt\n3oZ9WEN9AdK7lFFATPaxj0ryYOp3iLaWQiQUYlYvtWb+SK1PKZKIi98E5U0Mmc9Y\nqSZsxWb1gAL0eWbBs83qFAmxQj7VGO7sNgzHickWi6EnTQxAZDDraBspAoGBAIS7\nzS8VHDElmIgwGuidzxcyhym/cv03fFL48t7EgSv9PBx5We9zii4u+0gNlpwb/Wjw\nowQrs0hnNUNAAJUhAvd/q9b7rDz2iak+8qzHTZzJv8apnwfnyjcoE+ZzHp82ly01\nnNSjd9DbDj0600jwm+1R8OBoteiBMtEN/9JR/YZrAoGBANo/HPFk8NnGUINr4bSW\nosfCWI+R6Rq0sNZZE0vu8xPGQA4rEum3fzxTJ66Cshrc2F4ImNjCnN5UhzElMhcI\nSYIXajR5XLsO86ZI8UvFCkI0WuKi5Jx1H9oXOe0DjdOlMR1jnbfEJB8sq3zfb6+o\nvyfjf+yZS/InhZSVb7SclMU+\n-----END PRIVATE KEY-----\n"
};

let charts = {};

function b64url(str) {
  return btoa(unescape(encodeURIComponent(str))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}
function b64urlBytes(arr) {
  let s = '';
  arr.forEach(b => s += String.fromCharCode(b));
  return btoa(s).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}

async function getToken() {
  const now = Math.floor(Date.now() / 1000);
  const header = b64url(JSON.stringify({ alg: "RS256", typ: "JWT" }));
  const payload = b64url(JSON.stringify({
    iss: SA.client_email,
    scope: "https://www.googleapis.com/auth/bigquery",
    aud: "https://oauth2.googleapis.com/token",
    exp: now + 3600,
    iat: now
  }));
  const sigInput = header + "." + payload;
  const pemBody = SA.private_key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g, '');
  const binaryDer = Uint8Array.from(atob(pemBody), c => c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey(
    "pkcs8", binaryDer.buffer,
    { name: "RSASSA-PKCS1-v1_5", hash: "SHA-256" },
    false, ["sign"]
  );
  const sigBytes = await crypto.subtle.sign("RSASSA-PKCS1-v1_5", cryptoKey, new TextEncoder().encode(sigInput));
  const jwt = sigInput + "." + b64urlBytes(new Uint8Array(sigBytes));
  const resp = await fetch("https://oauth2.googleapis.com/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
  });
  const data = await resp.json();
  if (!data.access_token) throw new Error("Auth échouée : " + JSON.stringify(data));
  return data.access_token;
}

async function queryBQ(token, sql) {
  const url = `https://bigquery.googleapis.com/bigquery/v2/projects/${SA.project_id}/queries`;
  const resp = await fetch(url, {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ query: sql, useLegacySql: false, timeoutMs: 15000, location: "europe-west9" })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

function parseRows(result) {
  if (!result.rows) return [];
  const fields = result.schema.fields.map(f => f.name);
  return result.rows.map(r => {
    const obj = {};
    r.f.forEach((v, i) => obj[fields[i]] = v.v);
    return obj;
  });
}

function makeChart(id, type, labels, datasets, opts = {}) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';
  const textColor = isDark ? '#666' : '#bbb';
  charts[id] = new Chart(ctx, {
    type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: datasets.length > 1, labels: { color: textColor, font: { size: 11 }, boxWidth: 10, padding: 8 } } },
      scales: {
        x: { ticks: { color: textColor, font: { size: 10 }, maxTicksLimit: 7 }, grid: { color: gridColor } },
        y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor }, ...(opts.yBeginAtZero !== false ? { beginAtZero: true } : {}) }
      }
    }
  });
}

async function loadData() {
  const icon = document.getElementById('refresh-icon');
  icon.style.animation = 'spin 0.8s linear infinite';
  document.getElementById('last-update').textContent = 'Actualisation...';
  try {
    const token = await getToken();
    const [kpiRes, chartRes] = await Promise.all([
      queryBQ(token, `
        SELECT
          MAX(tempHigh) as temp_max, MIN(tempLow) as temp_min, AVG(tempAvg) as temp_moy,
          SUM(somme) as pluie_total,
          MAX(windgustHigh) as vent_max, AVG(windspeedAvg) as vent_moy,
          AVG(humidityAvg) as humidite_moy,
          MAX(pressureMax) as pression_max,
          SUM(Ensoleillement) as ensoleillement
        FROM \`meteo_cintre.data_5_min\`
        WHERE DATE(obsTimeLocal) = CURRENT_DATE('Europe/Paris')
      `),
      queryBQ(token, `
        SELECT
          FORMAT_TIMESTAMP('%H:%M', obsTimeLocal, 'Europe/Paris') as heure,
          tempAvg, tempHigh, somme as pluie, windspeedAvg as vent,
          humidityAvg as humidite, Ensoleillement as soleil
        FROM \`meteo_cintre.data_5_min\`
        WHERE DATE(obsTimeLocal) = CURRENT_DATE('Europe/Paris')
        ORDER BY obsTimeLocal ASC
      `)
    ]);

    const kpi = parseRows(kpiRes)[0] || {};
    const rows = parseRows(chartRes);
    const labels = rows.map(r => r.heure);
    const n = v => (v !== null && v !== '' && v !== undefined) ? parseFloat(v) : null;
    const fmt = (v, d=1) => (v !== null && v !== '') ? parseFloat(v).toFixed(d) : '—';

    const iconSun = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`;
    const iconTemp = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/></svg>`;
    const iconDrop = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>`;
    const iconWind = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M9.59 4.59A2 2 0 1111 8H2m10.59 11.41A2 2 0 1014 16H2m15.73-8.27A2.5 2.5 0 1119.5 12H2"/></svg>`;
    const iconHum = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>`;
    const iconGauge = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10"/><path d="M12 6v6l4 2"/></svg>`;

    document.getElementById('content').innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">${iconTemp} Température</div>
          <div class="kpi-value">${fmt(kpi.temp_moy)}<span class="kpi-unit">°C</span></div>
          <div class="kpi-sub">↑ ${fmt(kpi.temp_max)}° &nbsp;·&nbsp; ↓ ${fmt(kpi.temp_min)}°</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">${iconDrop} Pluie du jour</div>
          <div class="kpi-value">${fmt(kpi.pluie_total)}<span class="kpi-unit">mm</span></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">${iconWind} Vent moyen</div>
          <div class="kpi-value">${fmt(kpi.vent_moy)}<span class="kpi-unit">km/h</span></div>
          <div class="kpi-sub">Rafale max ${fmt(kpi.vent_max)} km/h</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">${iconHum} Humidité</div>
          <div class="kpi-value">${fmt(kpi.humidite_moy, 0)}<span class="kpi-unit">%</span></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">${iconGauge} Pression</div>
          <div class="kpi-value" style="font-size:22px;">${fmt(kpi.pression_max, 0)}<span class="kpi-unit">hPa</span></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">${iconSun} Ensoleillement</div>
          <div class="kpi-value" style="font-size:22px;">${kpi.ensoleillement ? Math.round(parseFloat(kpi.ensoleillement)/3600)+'h' : '—'}</div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Température</div>
        <div class="chart-wrap"><canvas id="chartTemp" height="150"></canvas></div>
        <div class="section-title">Pluie</div>
        <div class="chart-wrap"><canvas id="chartPluie" height="110"></canvas></div>
        <div class="section-title">Vent</div>
        <div class="chart-wrap"><canvas id="chartVent" height="110"></canvas></div>
        <div class="section-title">Humidité</div>
        <div class="chart-wrap"><canvas id="chartHum" height="110"></canvas></div>
      </div>
    `;

    makeChart('chartTemp', 'line', labels, [
      { label: 'Moy', data: rows.map(r => n(r.tempAvg)), borderColor: '#378ADD', backgroundColor: 'rgba(55,138,221,0.12)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 },
      { label: 'Max', data: rows.map(r => n(r.tempHigh)), borderColor: '#D85A30', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0, borderWidth: 1.5, borderDash: [4,3] }
    ], { yBeginAtZero: false });

    makeChart('chartPluie', 'bar', labels, [
      { label: 'mm', data: rows.map(r => n(r.pluie)), backgroundColor: '#378ADD', borderRadius: 2 }
    ]);

    makeChart('chartVent', 'line', labels, [
      { label: 'km/h', data: rows.map(r => n(r.vent)), borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.12)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 }
    ]);

    makeChart('chartHum', 'line', labels, [
      { label: '%', data: rows.map(r => n(r.humidite)), borderColor: '#EF9F27', backgroundColor: 'rgba(239,159,39,0.1)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 }
    ], { yBeginAtZero: false });

    document.getElementById('last-update').textContent = 'MAJ : ' + new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error">⚠️ Erreur : ${e.message}</div>`;
    document.getElementById('last-update').textContent = 'Erreur';
  }
  icon.style.animation = '';
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
