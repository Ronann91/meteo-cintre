<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Météo — Cintré</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ee; color: #1a1a1a; min-height: 100vh; }

/* HEADER */
.header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 10px 16px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.last-update { font-size: 11px; color: #999; }
.refresh-btn { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #666; cursor: pointer; }
.refresh-btn:active { background: #f5f5f5; }

/* TITRE DE PAGE */
.page-title { padding: 14px 16px 4px; font-size: 18px; font-weight: 600; color: #1a1a1a; }
.page-subtitle { padding: 0 16px 10px; font-size: 12px; color: #999; }

/* KPI BLOCS PRINCIPAUX (temp, pluie, vent) */
.kpi-main-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1px; background: #e0e0e0; margin: 0 16px 12px; border-radius: 12px; overflow: hidden; }
.kpi-main { background: #fff; padding: 14px 12px; }
.kpi-main-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.kpi-main-value { font-size: 32px; font-weight: 600; color: #1a1a1a; line-height: 1; }
.kpi-main-unit { font-size: 16px; font-weight: 400; color: #888; }
.kpi-main-sub { font-size: 11px; color: #aaa; margin-top: 6px; line-height: 1.6; }
.kpi-main-sub span { color: #666; }

/* KPI SECONDAIRES (ensoleillement, humidité, pression) */
.kpi-sec-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 1px; background: #e0e0e0; margin: 0 16px 16px; border-radius: 12px; overflow: hidden; }
.kpi-sec { background: #fff; padding: 12px 10px; text-align: center; }
.kpi-sec-icon { font-size: 22px; margin-bottom: 4px; }
.kpi-sec-value { font-size: 20px; font-weight: 600; color: #1a1a1a; line-height: 1; }
.kpi-sec-unit { font-size: 12px; color: #888; }
.kpi-sec-label { font-size: 10px; color: #aaa; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
.kpi-sec-sub { font-size: 10px; color: #bbb; margin-top: 3px; line-height: 1.5; }

/* GRAPHIQUES */
.charts-section { padding: 0 16px; }
.chart-block { margin-bottom: 12px; }
.chart-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
.chart-wrap { background: #fff; border-radius: 10px; padding: 12px 10px 8px; }

/* LOADING / ERROR */
.loading { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 2.5px solid #e5e5e5; border-top-color: #378ADD; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
.error { background: #fff0f0; border-radius: 10px; padding: 12px 14px; margin: 16px; font-size: 13px; color: #c0392b; border-left: 3px solid #e74c3c; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (prefers-color-scheme: dark) {
  body { background: #181818; color: #f0f0f0; }
  .header { background: #222; border-color: #333; }
  .header h1 { color: #f0f0f0; }
  .kpi-main, .kpi-sec, .chart-wrap { background: #222; }
  .kpi-main-grid, .kpi-sec-grid { background: #333; }
  .kpi-main-value, .kpi-sec-value { color: #f0f0f0; }
  .refresh-btn { border-color: #444; color: #aaa; }
  .error { background: #2a1515; }
}
</style>
</head>
<body>

<div class="header">
  <h1>⛅ Météo — Cintré</h1>
  <div class="header-right">
    <div class="last-update" id="last-update">Chargement...</div>
    <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
  </div>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div>Connexion à BigQuery...</div>
</div>

<script>
const SA = {
  project_id: "mystic-aileron-471209-p6",
  client_email: "app-perso@mystic-aileron-471209-p6.iam.gserviceaccount.com",
  private_key: "-----BEGIN PRIVATE KEY-----\nMIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQDBjetWxhjhSL4F\nWqQzif3uQoHH8tFceFmKHX0zg8qy9XZjSmpZApkBL1m/UX3VoHEehPd7aLMuC86j\nzvSfvv3kh1fZBzXtW6OGmlDgMLIIFzXJfd9efe24iX7CzGTuQPa6MG+/kg+KlKUT\nXvTOpT8pRLCcIDqkUGpCT0QGERCbQ0oueQXRA9JwXyOfJoukODhWqsgMPEoIt+xV\nFt3WqQQXAeyvHOP6oA4mSJisk7ShrVXKN9R4ik1LO/jXlRlEH2MH3mYbalSHyeic\n/tHkQjJ6wP61NjhQnInqWo7Tny4qtrPwpU3kj+Y7uoDWAiVYIAsLLR62h7YAPNEZ\noD6OFZkvAgMBAAECggEADPR1TIUM1ENcqJoVBHgXfXOJITtw5OoPQC3SG/kVv52r\nU2D/Nj70w74KGUKYlAxdlefbcrCi0ZGrvo4TFIAhmUKv0BBp/R2Vl+RLRn4r5Fu9\nV2Or6DSwjRny2JH6rXG+sd6dFCrwDFv/oojIBO7Nh/MXiROlKStSuWZ5zJgmzuV3\nlW63l7RRLujmr5Z4kaNK8x1EMmhNHg7FvBLJ7MdHOXQh8zPE+1YC9laBqQwZaEvJ\nq51hNKTWFhB5pg4SqL+0pbgzQ4Wg58grIhRaw6z9YYwgFPc59YSRB5xUCfTUt6Hg\nILw9O3Z5CNRKBLzA6Q6jIyzbLEyOGcZTy0Sq2AJr+QKBgQD7E8KPh96aykXYxnvz\nc7jd6Irb3H0Dyd1P2kKb9C6FWWW+XU4wcOws49WMBAp03KJm/h2rEvbzXk1u1eHL\n/SwVhRuZkrTluIitvyvC3TZKCXZGLVKhbRq1TKuqoV2V1vV5Re29E0abliRWhFoP\n2ZFGrIMngvck/knyV63b3U82SQKBgQDFWW7hh0abOnn2KlVR8h4l6Sp/N3Nu1//U\nE9mY9IeCZ2PlwefnCQRuAW/tX6/FGerOne+RmUfoCkEqaOYQNoAiNhzhRLIF4cey\nyJxpsHuFFLssuNX3brm8y1vdQ5FdPSnp1KC/nHUt23bGqo2yO8pBL3rCsl6diTRJ\n5xEMMHtztwKBgDigi0gN79HffwNWOMx+tBowgWj3AKcjFywUYOOFnhxrPjxCFQlt\n3oZ9WEN9AdK7lFFATPaxj0ryYOp3iLaWQiQUYlYvtWb+SK1PKZKIi98E5U0Mmc9Y\nqSZsxWb1gAL0eWbBs83qFAmxQj7VGO7sNgzHickWi6EnTQxAZDDraBspAoGBAIS7\nzS8VHDElmIgwGuidzxcyhym/cv03fFL48t7EgSv9PBx5We9zii4u+0gNlpwb/Wjw\nowQrs0hnNUNAAJUhAvd/q9b7rDz2iak+8qzHTZzJv8apnwfnyjcoE+ZzHp82ly01\nnNSjd9DbDj0600jwm+1R8OBoteiBMtEN/9JR/YZrAoGBANo/HPFk8NnGUINr4bSW\nosfCWI+R6Rq0sNZZE0vu8xPGQA4rEum3fzxTJ66Cshrc2F4ImNjCnN5UhzElMhcI\nSYIXajR5XLsO86ZI8UvFCkI0WuKi5Jx1H9oXOe0DjdOlMR1jnbfEJB8sq3zfb6+o\nvyfjf+yZS/InhZSVb7SclMU+\n-----END PRIVATE KEY-----\n"
};

let charts = {};

function b64url(str) {
  return btoa(unescape(encodeURIComponent(str))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}
function b64urlBytes(arr) {
  let s = ''; arr.forEach(b => s += String.fromCharCode(b));
  return btoa(s).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}

async function getToken() {
  const now = Math.floor(Date.now() / 1000);
  const header = b64url(JSON.stringify({ alg: "RS256", typ: "JWT" }));
  const payload = b64url(JSON.stringify({
    iss: SA.client_email,
    scope: "https://www.googleapis.com/auth/bigquery",
    aud: "https://oauth2.googleapis.com/token",
    exp: now + 3600, iat: now
  }));
  const sigInput = header + "." + payload;
  const pemBody = SA.private_key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g, '');
  const binaryDer = Uint8Array.from(atob(pemBody), c => c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey("pkcs8", binaryDer.buffer, { name: "RSASSA-PKCS1-v1_5", hash: "SHA-256" }, false, ["sign"]);
  const sigBytes = await crypto.subtle.sign("RSASSA-PKCS1-v1_5", cryptoKey, new TextEncoder().encode(sigInput));
  const jwt = sigInput + "." + b64urlBytes(new Uint8Array(sigBytes));
  const resp = await fetch("https://oauth2.googleapis.com/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
  });
  const data = await resp.json();
  if (!data.access_token) throw new Error("Auth échouée : " + JSON.stringify(data));
  return data.access_token;
}

async function queryBQ(token, sql) {
  const url = `https://bigquery.googleapis.com/bigquery/v2/projects/${SA.project_id}/queries`;
  const resp = await fetch(url, {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ query: sql, useLegacySql: false, timeoutMs: 15000, location: "europe-west9" })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

function parseRows(result) {
  if (!result.rows) return [];
  const fields = result.schema.fields.map(f => f.name);
  return result.rows.map(r => { const o = {}; r.f.forEach((v,i) => o[fields[i]] = v.v); return o; });
}

function pad(n) { return String(n).padStart(2,'0'); }

function makeChart(id, type, labels, datasets, opts={}) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';
  const textColor = isDark ? '#666' : '#bbb';
  charts[id] = new Chart(ctx, {
    type, data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: datasets.length > 1, labels: { color: textColor, font: { size: 11 }, boxWidth: 10, padding: 8 } } },
      scales: {
        x: { ticks: { color: textColor, font: { size: 10 }, maxTicksLimit: 7 }, grid: { color: gridColor } },
        y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor }, ...(opts.yBeginAtZero !== false ? { beginAtZero: true } : {}) }
      }
    }
  });
}

async function loadData() {
  document.getElementById('last-update').textContent = 'Actualisation...';
  try {
    const token = await getToken();
    const [kpiRes, chartRes] = await Promise.all([
      queryBQ(token, `
        SELECT
          MAX(tempHigh)    AS temp_max,
          MIN(tempLow)     AS temp_min,
          AVG(tempAvg)     AS temp_moy,
          SUM(somme)       AS pluie_total,
          MAX(precipRate)  AS pluie_rate_max,
          MAX(windgustHigh) AS vent_rafale,
          AVG(windspeedAvg) AS vent_moy,
          AVG(humidityAvg) AS humidite_moy,
          MAX(humidityHigh) AS humidite_max,
          MIN(humidityLow)  AS humidite_min,
          MAX(pressureMax) AS pression,
          MAX(pressureMax) AS pression_max,
          MIN(pressureMin) AS pression_min,
          SUM(CASE WHEN solarRadiationHigh > 120 THEN 5.0/60.0 ELSE 0 END) AS ensoleillement_h,
          MAX(obsTimeLocal) AS derniere_obs
        FROM \`meteo_cintre.data_5_min_today\`
      `),
      queryBQ(token, `
        SELECT
          FORMAT_TIMESTAMP('%H:%M', obsTimeLocal, 'Europe/Paris') AS heure,
          tempAvg, tempHigh, tempLow,
          somme            AS pluie,
          precipRate       AS pluie_rate,
          windspeedAvg     AS vent,
          windgustHigh     AS rafale,
          humidityAvg      AS humidite,
          pressureMax      AS pression,
          solarRadiationHigh AS soleil
        FROM \`meteo_cintre.data_5_min_today\`
        ORDER BY obsTimeLocal ASC
      `)
    ]);

    const k = parseRows(kpiRes)[0] || {};
    const rows = parseRows(chartRes);
    const labels = rows.map(r => r.heure);
    const n = v => (v !== null && v !== '' && v !== undefined) ? parseFloat(v) : null;
    const fmt = (v, d=1) => (v !== null && v !== '') ? parseFloat(v).toFixed(d) : '—';

    // Dernière obs heure
    const lastObs = k.derniere_obs ? k.derniere_obs.substring(11,16) : '—';

    // Ensoleillement formaté en HhMM
    const ensSec = k.ensoleillement_h ? parseFloat(k.ensoleillement_h) : 0;
    const ensH = Math.floor(ensSec);
    const ensMin = Math.round((ensSec - ensH) * 60);
    const ensStr = ensH > 0 ? `${ensH}H${pad(ensMin)}` : `${ensMin}min`;

    document.getElementById('content').innerHTML = `
      <div class="page-title">Suivi journée en cours</div>
      <div class="page-subtitle">Dernière donnée : ${lastObs}</div>

      <div class="kpi-main-grid">
        <div class="kpi-main">
          <div class="kpi-main-label">🌡 Température actuel</div>
          <div class="kpi-main-value">${fmt(k.temp_moy)}<span class="kpi-main-unit">°C</span></div>
          <div class="kpi-main-sub">
            Max : <span>${fmt(k.temp_max)}°C</span><br>
            Min : <span>${fmt(k.temp_min)}°C</span>
          </div>
        </div>
        <div class="kpi-main">
          <div class="kpi-main-label">💧 Pluie du jour</div>
          <div class="kpi-main-value">${fmt(k.pluie_total)}<span class="kpi-main-unit">mm</span></div>
          <div class="kpi-main-sub">
            Intensité max : <span>${fmt(k.pluie_rate_max)} mm/h</span>
          </div>
        </div>
        <div class="kpi-main">
          <div class="kpi-main-label">💨 Vent moyen</div>
          <div class="kpi-main-value">${fmt(k.vent_moy)}<span class="kpi-main-unit">km/h</span></div>
          <div class="kpi-main-sub">
            Rafale max : <span>${fmt(k.vent_rafale)} km/h</span>
          </div>
        </div>
        <div class="kpi-main" style="visibility:hidden;"></div>
      </div>

      <div class="kpi-sec-grid">
        <div class="kpi-sec">
          <div class="kpi-sec-icon">☀️</div>
          <div class="kpi-sec-value">${ensStr}</div>
          <div class="kpi-sec-label">Ensoleillement</div>
        </div>
        <div class="kpi-sec">
          <div class="kpi-sec-icon">💦</div>
          <div class="kpi-sec-value">${fmt(k.humidite_moy, 0)}<span class="kpi-sec-unit">%</span></div>
          <div class="kpi-sec-label">Humidité</div>
          <div class="kpi-sec-sub">Max : ${fmt(k.humidite_max, 0)}%<br>Min : ${fmt(k.humidite_min, 0)}%</div>
        </div>
        <div class="kpi-sec">
          <div class="kpi-sec-icon">🔵</div>
          <div class="kpi-sec-value" style="font-size:16px;">${fmt(k.pression, 0)}<span class="kpi-sec-unit">hPa</span></div>
          <div class="kpi-sec-label">Pression</div>
          <div class="kpi-sec-sub">Max : ${fmt(k.pression_max, 0)}<br>Min : ${fmt(k.pression_min, 0)}</div>
        </div>
      </div>

      <div class="charts-section">
        <div class="chart-block">
          <div class="chart-title">Température</div>
          <div class="chart-wrap"><canvas id="chartTemp" height="150"></canvas></div>
        </div>
        <div class="chart-block">
          <div class="chart-title">Pluie</div>
          <div class="chart-wrap"><canvas id="chartPluie" height="110"></canvas></div>
        </div>
        <div class="chart-block">
          <div class="chart-title">Vent</div>
          <div class="chart-wrap"><canvas id="chartVent" height="110"></canvas></div>
        </div>
        <div class="chart-block">
          <div class="chart-title">Ensoleillement</div>
          <div class="chart-wrap"><canvas id="chartSoleil" height="110"></canvas></div>
        </div>
      </div>
    `;

    makeChart('chartTemp', 'line', labels, [
      { label: 'Moy', data: rows.map(r => n(r.tempAvg)), borderColor: '#e8604c', backgroundColor: 'rgba(232,96,76,0.1)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 },
      { label: 'Max', data: rows.map(r => n(r.tempHigh)), borderColor: '#aaa', backgroundColor: 'transparent', tension: 0.4, pointRadius: 0, borderWidth: 1, borderDash: [3,3] },
      { label: 'Min', data: rows.map(r => n(r.tempLow)), borderColor: '#ccc', backgroundColor: 'transparent', tension: 0.4, pointRadius: 0, borderWidth: 1, borderDash: [3,3] },
    ], { yBeginAtZero: false });

    makeChart('chartPluie', 'bar', labels, [
      { label: 'Précipitations (mm)', data: rows.map(r => n(r.pluie)), backgroundColor: '#4a9edd', borderRadius: 1 },
      { label: 'Intensité (mm/h)', data: rows.map(r => n(r.pluie_rate)), type: 'line', borderColor: '#1a6aaa', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0, borderWidth: 1.5 }
    ]);

    makeChart('chartVent', 'line', labels, [
      { label: 'Vent moy (km/h)', data: rows.map(r => n(r.vent)), borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.1)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 },
      { label: 'Rafale max', data: rows.map(r => n(r.rafale)), borderColor: '#aaa', backgroundColor: 'transparent', tension: 0.3, pointRadius: 2, pointRadius: 0, borderWidth: 1, borderDash: [3,3] }
    ]);

    makeChart('chartSoleil', 'bar', labels, [
      { label: 'W/m²', data: rows.map(r => n(r.soleil)), backgroundColor: '#f5c518', borderRadius: 1 }
    ]);

    document.getElementById('last-update').textContent = 'MAJ : ' + new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error">⚠️ Erreur : ${e.message}</div>`;
    document.getElementById('last-update').textContent = 'Erreur';
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
