function b64url(s) { return btoa(unescape(encodeURIComponent(s))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_'); }
function b64urlB(a) { let s=''; a.forEach(b=>s+=String.fromCharCode(b)); return btoa(s).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_'); }

async function getToken() {
  const now = Math.floor(Date.now()/1000);
  const h = b64url(JSON.stringify({alg:"RS256",typ:"JWT"}));
  const p = b64url(JSON.stringify({iss:SA.client_email,scope:"https://www.googleapis.com/auth/bigquery",aud:"https://oauth2.googleapis.com/token",exp:now+3600,iat:now}));
  const sig = h+"."+p;
  const pem = SA.private_key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const der = Uint8Array.from(atob(pem), c=>c.charCodeAt(0));
  const key = await crypto.subtle.importKey("pkcs8", der.buffer, {name:"RSASSA-PKCS1-v1_5",hash:"SHA-256"}, false, ["sign"]);
  const bytes = await crypto.subtle.sign("RSASSA-PKCS1-v1_5", key, new TextEncoder().encode(sig));
  const jwt = sig+"."+b64urlB(new Uint8Array(bytes));
  const r = await fetch("https://oauth2.googleapis.com/token", {method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion="+jwt});
  const d = await r.json();
  if(!d.access_token) throw new Error("Auth: "+JSON.stringify(d));
  return d.access_token;
}

async function queryBQ(token, sql) {
  const r = await fetch("https://bigquery.googleapis.com/bigquery/v2/projects/"+SA.project_id+"/queries", {
    method:"POST",
    headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
    body:JSON.stringify({query:sql,useLegacySql:false,timeoutMs:15000,location:"europe-west9"})
  });
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return d;
}

function parseRows(res) {
  if(!res.rows) return [];
  const f = res.schema.fields.map(f=>f.name);
  return res.rows.map(r=>{const o={};r.f.forEach((v,i)=>o[f[i]]=v.v);return o;});
}

function n(v) { return (v!==null&&v!==''&&v!==undefined)?parseFloat(v):null; }
function fmt(v,d=1) { return (v!==null&&v!==''&&v!==undefined)?parseFloat(v).toFixed(d):'—'; }
function pad(x) { return String(x).padStart(2,'0'); }
function tempIcon(t) { if(t===null)return'🌡️'; if(t>=35)return'🥵'; if(t>=25)return'☀️'; if(t>=15)return'🌤️'; if(t>=5)return'🌥️'; return'🥶'; }

function heatColor(val,min,max,type) {
  if(val===null||!isFinite(val)||min===max) return '';
  const r = Math.max(0,Math.min(1,(val-min)/(max-min)));
  if(type==='temp') return 'background:rgba('+(Math.round(55+r*180))+','+(Math.round(130-r*80))+','+(Math.round(221-r*190))+',0.18);';
  if(type==='rain') return 'background:rgba(74,158,221,'+(0.08+r*0.35)+');';
  if(type==='wind') return 'background:rgba(29,158,117,'+(0.08+r*0.35)+');';
  return '';
}

function makeChart(id,type,labels,datasets,opts) {
  opts = opts||{};
  if(charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  const units = {cTemp:'°C',cPluie:' mm',cVent:' km/h',cSoleil:' W/m²'};
  const scales = {
    x:{ticks:{color:'#ccc',font:{size:9},maxTicksLimit:7},grid:{color:'rgba(0,0,0,0.03)'}},
    y:{ticks:{color:'#ccc',font:{size:9}},grid:{color:'rgba(0,0,0,0.03)'},beginAtZero:opts.y0!==false}
  };
  if(opts.y2) scales.y2 = {position:'right',ticks:{color:'#e8a020',font:{size:9}},grid:{drawOnChartArea:false},beginAtZero:true};
  charts[id] = new Chart(ctx,{
    type:type,
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:true,aspectRatio:1,animation:false,
      plugins:{
        legend:{display:datasets.length>1,labels:{color:'#ccc',font:{size:10},boxWidth:10,padding:6}},
        tooltip:{mode:'index',intersect:false,callbacks:{label:function(c){return c.dataset.label+': '+parseFloat(c.parsed.y).toFixed(1)+(units[id]||'');}}}
      },
      scales:scales
    }
  });
}

function showModal(heure) {
  const rows = rawRows.filter(r=>r.heure.startsWith(heure+':'));
  if(!rows.length) return;
  const html = '<div class="modal-overlay" onclick="closeModal(event)"><div class="modal"><div class="modal-header"><div class="modal-title">Détail '+heure+'h — '+rows.length+' mesures</div><button class="modal-close" onclick="document.getElementById(\'modal-container\').innerHTML=\'\'">✕</button></div><div style="overflow-x:auto;"><table class="detail-table"><thead><tr><th>Heure</th><th>T°Max</th><th>T°Min</th><th>T°Moy</th><th>Pluie</th><th>Intensité</th><th>Vent</th><th>Rafale</th></tr></thead><tbody>'+rows.map(function(r){return '<tr><td>'+r.heure+'</td><td>'+fmt(n(r.tempHigh))+'°</td><td>'+fmt(n(r.tempLow))+'°</td><td>'+fmt(n(r.tempAvg))+'°</td><td>'+fmt(n(r.pluie))+' mm</td><td>'+fmt(n(r.pluie_rate))+' mm/h</td><td>'+fmt(n(r.vent))+' km/h</td><td>'+fmt(n(r.rafale))+' km/h</td></tr>';}).join('')+'</tbody></table></div></div></div>';
  document.getElementById('modal-container').innerHTML = html;
}

function closeModal(e) {
  if(e.target.classList.contains('modal-overlay')) document.getElementById('modal-container').innerHTML='';
}

function buildHourlyTable(rows) {
  const byHour = {};
  rows.forEach(function(r){const h=r.heure.substring(0,2);if(!byHour[h])byHour[h]=[];byHour[h].push(r);});
  const hours = Object.keys(byHour).sort();
  const agg = hours.map(function(h){
    const rr=byHour[h];
    const vals = function(key){return rr.map(function(r){return n(r[key]);}).filter(function(v){return v!==null;});};
    return {
      heure:h+'h',
      temp_max:Math.max.apply(null,vals('tempHigh')),
      temp_min:Math.min.apply(null,vals('tempLow')),
      temp_moy:vals('tempAvg').reduce(function(a,b){return a+b;},0)/vals('tempAvg').length,
      pluie:vals('pluie').reduce(function(a,b){return a+b;},0),
      intensite_max:Math.max.apply(null,vals('pluie_rate')),
      vent_moy:vals('vent').reduce(function(a,b){return a+b;},0)/vals('vent').length,
      vent_max:Math.max.apply(null,vals('rafale'))
    };
  });
  function mm(arr){return [Math.min.apply(null,arr.filter(isFinite)),Math.max.apply(null,arr.filter(isFinite))];}
  const tmxR=mm(agg.map(function(r){return r.temp_max;}));
  const tmnR=mm(agg.map(function(r){return r.temp_min;}));
  const tmyR=mm(agg.map(function(r){return r.temp_moy;}));
  const plR=mm(agg.map(function(r){return r.pluie;}));
  const inR=mm(agg.map(function(r){return r.intensite_max;}));
  const vmR=mm(agg.map(function(r){return r.vent_moy;}));
  const vxR=mm(agg.map(function(r){return r.vent_max;}));
  const rows_html = agg.map(function(r){
    const h=r.heure.replace('h','');
    return '<tr onclick="showModal(\''+h+'\')">'
      +'<td>'+r.heure+'</td>'
      +'<td style="'+heatColor(r.temp_max,tmxR[0],tmxR[1],'temp')+'">'+fmt(r.temp_max)+'°</td>'
      +'<td style="'+heatColor(r.temp_min,tmnR[0],tmnR[1],'temp')+'">'+fmt(r.temp_min)+'°</td>'
      +'<td style="'+heatColor(r.temp_moy,tmyR[0],tmyR[1],'temp')+'">'+fmt(r.temp_moy)+'°</td>'
      +'<td style="'+heatColor(r.pluie,plR[0],plR[1],'rain')+'">'+fmt(r.pluie)+' mm</td>'
      +'<td style="'+heatColor(r.intensite_max,inR[0],inR[1],'rain')+'">'+(isFinite(r.intensite_max)&&r.intensite_max>0?fmt(r.intensite_max)+' mm/h':'—')+'</td>'
      +'<td style="'+heatColor(r.vent_moy,vmR[0],vmR[1],'wind')+'">'+fmt(r.vent_moy)+'</td>'
      +'<td style="'+heatColor(r.vent_max,vxR[0],vxR[1],'wind')+'">'+(isFinite(r.vent_max)?fmt(r.vent_max):'—')+'</td>'
      +'</tr>';
  }).join('');
  return '<div class="table-section"><div class="section-header" style="padding-left:0;">Tableau horaire — cliquer pour le détail</div><div class="table-card"><div class="table-wrap"><table><thead><tr><th>Heure</th><th>T°Max</th><th>T°Min</th><th>T°Moy</th><th>Pluie</th><th>Intens.</th><th>Vent</th><th>Rafale</th></tr></thead><tbody>'+rows_html+'</tbody></table></div></div></div>';
}

function getSelectedDate() {
  const dp = document.getElementById('datePicker');
  return dp ? dp.value : '';
}

async function loadData() {
  const d = getSelectedDate();
  if(!d) return;
  document.getElementById('top-sub').textContent = new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Chargement...</div>';

  const qKpi = "SELECT MAX(tempHigh) AS temp_max, MIN(tempLow) AS temp_min, AVG(tempAvg) AS temp_moy, SUM(somme) AS pluie_total, MAX(precipRate) AS pluie_rate_max, MAX(windgustHigh) AS vent_rafale_max, AVG(humidityAvg) AS humidite_moy, MAX(humidityHigh) AS humidite_max, MIN(humidityLow) AS humidite_min, MAX(pressureMax) AS pression_max, MIN(pressureMin) AS pression_min, SUM(CASE WHEN solarRadiationHigh>120 THEN 5.0/60.0 ELSE 0 END) AS ens_h FROM `meteo_cintre.data_5_min` WHERE DATE(obsTimeLocal) = '" + d + "'";

  const qLast = "SELECT tempHigh AS temp_actuelle, windgustHigh AS vent_actuel, humidityAvg AS hum_actuelle, pressureMax AS pression_actuelle, solarRadiationHigh AS soleil_actuel, FORMAT_TIMESTAMP('%H:%M', obsTimeLocal) AS heure FROM `meteo_cintre.data_5_min` WHERE DATE(obsTimeLocal) = '" + d + "' ORDER BY obsTimeLocal DESC LIMIT 1";

  const qEx = "SELECT FORMAT_TIMESTAMP('%H:%M', t_max.obsTimeLocal) AS heure_temp_max, FORMAT_TIMESTAMP('%H:%M', t_min.obsTimeLocal) AS heure_temp_min, FORMAT_TIMESTAMP('%H:%M', p_max.obsTimeLocal) AS heure_pluie_max, FORMAT_TIMESTAMP('%H:%M', h_max.obsTimeLocal) AS heure_hum_max, FORMAT_TIMESTAMP('%H:%M', h_min.obsTimeLocal) AS heure_hum_min, FORMAT_TIMESTAMP('%H:%M', v_max.obsTimeLocal) AS heure_vent_max FROM (SELECT obsTimeLocal FROM `meteo_cintre.data_5_min` WHERE DATE(obsTimeLocal) = '" + d + "' ORDER BY tempHigh DESC LIMIT 1) t_max, (SELECT obsTimeLocal FROM `meteo_cintre.data_5_min` WHERE DATE(obsTimeLocal) = '" + d + "' ORDER BY tempLow ASC LIMIT 1) t_min, (SELECT obsTimeLocal FROM `meteo_cintre.data_5_min` WHERE DATE(obsTimeLocal) = '" + d + "' ORDER BY precipRate DESC LIMIT 1) p_max, (SELECT obsTimeLocal FROM `meteo_cintre.data_5_min` WHERE DATE(obsTimeLocal) = '" + d + "' ORDER BY humidityHigh DESC LIMIT 1) h_max, (SELECT obsTimeLocal FROM `meteo_cintre.data_5_min` WHERE DATE(obsTimeLocal) = '" + d + "' ORDER BY humidityLow ASC LIMIT 1) h_min, (SELECT obsTimeLocal FROM `meteo_cintre.data_5_min` WHERE DATE(obsTimeLocal) = '" + d + "' ORDER BY windgustHigh DESC LIMIT 1) v_max";

  const qChart = "SELECT FORMAT_TIMESTAMP('%H:%M', obsTimeLocal) AS heure, tempHigh, tempLow, AVG(tempAvg) OVER (ORDER BY obsTimeLocal ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS tempMoyCumul, somme AS pluie, precipRate AS pluie_rate, windspeedAvg AS vent, windgustHigh AS rafale, humidityAvg AS humidite, solarRadiationHigh AS soleil, tempAvg FROM `meteo_cintre.data_5_min` WHERE DATE(obsTimeLocal) = '" + d + "' ORDER BY obsTimeLocal ASC";

  try {
    const token = await getToken();
    const [kpiRes,lastRes,exRes,chartRes] = await Promise.all([
      queryBQ(token,qKpi), queryBQ(token,qLast), queryBQ(token,qEx), queryBQ(token,qChart)
    ]);

    const k = parseRows(kpiRes)[0]||{};
    const last = parseRows(lastRes)[0]||{};
    const ex = parseRows(exRes)[0]||{};
    const rows = parseRows(chartRes);
    rawRows = rows;
    const labels = rows.map(function(r){return r.heure;});

    const tempActuelle = n(last.temp_actuelle);
    const delta = (n(k.temp_max)!==null&&n(k.temp_min)!==null)?(n(k.temp_max)-n(k.temp_min)).toFixed(1):'—';
    const ensH = parseFloat(k.ens_h||0);
    const ensHH = Math.floor(ensH);
    const ensMM = Math.round((ensH-ensHH)*60);
    const ensStr = ensHH>0?ensHH+'H'+pad(ensMM):ensMM+'min';

    document.getElementById('content').innerHTML =
      '<div class="main-temp-card">'
        +'<div class="main-temp-left">'
          +'<div class="main-temp-label">Température max</div>'
          +'<div class="main-temp-value">'+fmt(tempActuelle)+'<sup>°C</sup></div>'
          +'<div class="main-temp-meta">'
            +'<div class="meta-item"><b>↑ '+fmt(k.temp_max)+'°C</b><span>'+( ex.heure_temp_max||'—')+'</span></div>'
            +'<div class="meta-item"><b>↓ '+fmt(k.temp_min)+'°C</b><span>'+(ex.heure_temp_min||'—')+'</span></div>'
            +'<div class="meta-item"><b>Moy '+fmt(k.temp_moy)+'°C</b></div>'
            +'<div class="meta-item"><b>Δ '+delta+'°C</b></div>'
          +'</div>'
        +'</div>'
        +'<div class="main-temp-icon">'+tempIcon(tempActuelle)+'</div>'
      +'</div>'
      +'<div class="kpi-grid">'
        +'<div class="kpi-card"><div class="kpi-card-header"><div class="kpi-icon blue">🌧️</div><div class="kpi-card-title">Pluie du jour</div></div><div class="kpi-card-value">'+fmt(k.pluie_total)+'<span class="kpi-card-unit"> mm</span></div><div class="kpi-sub-grid"><div class="kpi-sub-item"><b>'+fmt(k.pluie_rate_max)+' mm/h</b><span>Intensité max</span></div><div class="kpi-sub-item"><b>'+(ex.heure_pluie_max||'—')+'</b><span>heure max</span></div></div></div>'
        +'<div class="kpi-card"><div class="kpi-card-header"><div class="kpi-icon teal">💨</div><div class="kpi-card-title">Vent</div></div><div class="kpi-card-value">'+fmt(n(last.vent_actuel),1)+'<span class="kpi-card-unit"> km/h</span></div><div class="kpi-sub-grid"><div class="kpi-sub-item"><b>'+fmt(k.vent_rafale_max)+' km/h</b><span>Rafale max (56s)</span></div><div class="kpi-sub-item"><b>'+(ex.heure_vent_max||'—')+'</b><span>heure max</span></div></div></div>'
        +'<div class="kpi-card"><div class="kpi-card-header"><div class="kpi-icon amber">☀️</div><div class="kpi-card-title">Ensoleillement</div></div><div class="kpi-card-value">'+ensStr+'</div><div class="kpi-sub-single">Rayonnement max<br><b>'+fmt(n(k.pluie_rate_max),0)+' W/m²</b></div></div>'
        +'<div class="kpi-card"><div class="kpi-card-header"><div class="kpi-icon pink">💦</div><div class="kpi-card-title">Humidité</div></div><div class="kpi-card-value">'+fmt(k.humidite_moy,0)+'<span class="kpi-card-unit">%</span></div><div class="kpi-sub-grid"><div class="kpi-sub-item"><b>↑ '+fmt(k.humidite_max,0)+'%</b><span>'+(ex.heure_hum_max||'—')+'</span></div><div class="kpi-sub-item"><b>↓ '+fmt(k.humidite_min,0)+'%</b><span>'+(ex.heure_hum_min||'—')+'</span></div></div></div>'
        +'<div class="kpi-card full"><div class="kpi-card-header"><div class="kpi-icon purple">🔵</div><div class="kpi-card-title">Pression</div></div><div class="kpi-card-value">'+fmt(n(last.pression_actuelle),0)+'<span class="kpi-card-unit"> hPa</span></div><div class="kpi-sub-single">↑ <b>'+fmt(k.pression_max,0)+' hPa</b> &nbsp;·&nbsp; ↓ <b>'+fmt(k.pression_min,0)+' hPa</b></div></div>'
      +'</div>'
      +'<div class="section-header">Graphiques</div>'
      +'<div class="chart-card"><div class="chart-card-title"><span>🌡️ Température</span><em>°C</em></div><canvas id="cTemp"></canvas></div>'
      +'<div class="chart-card"><div class="chart-card-title"><span>🌧️ Pluie</span><em>mm</em></div><canvas id="cPluie"></canvas></div>'
      +'<div class="chart-card"><div class="chart-card-title"><span>💨 Vent</span><em>km/h</em></div><canvas id="cVent"></canvas></div>'
      +'<div class="chart-card"><div class="chart-card-title"><span>☀️ Rayonnement</span><em>W/m²</em></div><canvas id="cSoleil"></canvas></div>'
      + buildHourlyTable(rows)
      +'<div class="pb"></div>';

    makeChart('cTemp','line',labels,[
      {label:'Max',data:rows.map(function(r){return n(r.tempHigh);}),borderColor:'#e8604c',backgroundColor:'transparent',tension:0.4,pointRadius:0,borderWidth:2},
      {label:'Min',data:rows.map(function(r){return n(r.tempLow);}),borderColor:'#4a9edd',backgroundColor:'rgba(74,158,221,0.06)',fill:'-1',tension:0.4,pointRadius:0,borderWidth:2},
      {label:'Moy',data:rows.map(function(r){return n(r.tempMoyCumul);}),borderColor:'#bbb',backgroundColor:'transparent',tension:0.4,pointRadius:0,borderWidth:1.5,borderDash:[4,3]}
    ],{y0:false});

    makeChart('cPluie','bar',labels,[
      {label:'Précip.',data:rows.map(function(r){return n(r.pluie);}),backgroundColor:'rgba(74,158,221,0.65)',borderRadius:2},
      {label:'Intensité',data:rows.map(function(r){return n(r.pluie_rate);}),type:'line',borderColor:'#1a6aaa',backgroundColor:'transparent',tension:0.3,pointRadius:0,borderWidth:1.5}
    ],{y0:true});

    makeChart('cVent','line',labels,[
      {label:'Moy',data:rows.map(function(r){return n(r.vent);}),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',fill:true,tension:0.3,pointRadius:0,borderWidth:2},
      {label:'Rafale',data:rows.map(function(r){return n(r.rafale);}),borderColor:'#ccc',backgroundColor:'transparent',tension:0.3,pointRadius:0,borderWidth:1,borderDash:[3,3]}
    ],{y0:true});

    makeChart('cSoleil','bar',labels,[
      {label:'Ensoleillement',data:rows.map(function(r){return n(r.soleil)>150?n(r.soleil):null;}),backgroundColor:'rgba(245,197,24,0.5)',borderRadius:0,yAxisID:'y'},
      {label:'W/m²',data:rows.map(function(r){return n(r.soleil);}),type:'line',borderColor:'#e8a020',backgroundColor:'transparent',tension:0.3,pointRadius:0,borderWidth:1,yAxisID:'y'}
    ],{y0:true});

  } catch(e) {
    document.getElementById('content').innerHTML = '<div style="padding:16px"><div class="error">⚠️ '+e.message+'</div></div>';
  }
}

// Init date picker sur hier
(function(){
  const dp = document.getElementById('datePicker');
  const hier = new Date();
  hier.setDate(hier.getDate()-1);
  dp.value = hier.toISOString().split('T')[0];
})();

loadData();
</script>
</body>
